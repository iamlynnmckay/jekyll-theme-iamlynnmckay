
# jekyll-theme-iamlynnmckay
show_coming_soon: true
show_email: false
show_excerpts: true
show_tags: true
show_header: true
show_footer: true
show_categories: true
show_homepage_links: true
homepage_links:
  - 'about'
  - 'contact'
  - 'blog'
show_links_in_header: false
show_posts: true

theme: jekyll-theme-iamlynnmckay

# minima
email: iamlynnmckay@gmail.com
baseurl: "" 
twitter_username: iamlynnmckay
github_username:  iamlynnmckay

# jekyll-seo-tag 
author: "Lynn McKay"
url: "https://iamlynnmckay.com"
title: "@iamlynnmckay"
description: "Lynn's things and stuff."
twitter:
  username: "iamlynnmckay"
  card: "site.twitter.card"
logo: "assets/images/logo.svg"

# jekyll-scholar
scholar:
  style: apa

# plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  # - jekyll-scholar
  # - jekyll-postcss

include: 
  - '_pages'
  - 'assets/pages'
  - 'assets/posts'

# exclude
exclude:
  - .gitignore
  - .jekyll-cache/
  - .sass-cache/
  - Gemfile
  - Gemfile.lock
  - Makefile
  - README.md
  - _test/
  - assets/posts
  - gemfiles/
  - netlify.toml
  - node_modules/
  - package-lock.json
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - yarn.lock
  # - postcss.config.js
  # - purgecss.config.js
