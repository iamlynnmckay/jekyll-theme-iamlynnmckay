<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  {%- include head.html -%}
  <body>
    {% if site.show_header -%}
      {%- include header.html -%}
    {%- endif -%}
    <main aria-label="Content">
      <div>
        {{ content }}
      </div>
    </main>
    {% if site.show_footer -%}
      {%- include footer.html -%}
    {%- endif -%}
  </body>
</html>
