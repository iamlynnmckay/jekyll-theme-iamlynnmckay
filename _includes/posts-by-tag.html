{%- if site.posts.size > 0 -%}
<ul class="post-list">
    {% for tag in site.tags %}
    <li>
        {% capture tag_key %}{{ tag | first }}{% endcapture %}
        <span id="tag-{{ tag_key }}" class="post-meta post-link">#{{tag_key}}</div>
        <!-- include posts-list.html posts=site.tags[tag_key] list_type="post-list" size="small" -->
    </li>
    {% endfor %}
</ul>
{%- endif -%}
